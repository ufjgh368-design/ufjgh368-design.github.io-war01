<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>甲午戰爭 1894–1895｜3D 歷史特別節目</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<style>
  :root{
    --ink:#0B121C;          /* 深夜海墨 */
    --qing:#F0B429;         /* 黃龍金 */
    --qing-dim:#8f6a12;
    --jp:#4C7FC4;           /* 聯合艦隊藍 */
    --jp-dim:#274a7c;
    --sun:#C6392F;          /* 旭日紅 */
    --paper:#EAE0C8;        /* 宣紙米 */
    --line:rgba(240,180,41,.35);
    --panel:rgba(8,14,22,.82);
  }
  *{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
  html,body{width:100%;height:100%;overflow:hidden;background:var(--ink);
    font-family:"Noto Serif TC","Songti TC","PMingLiU",serif;color:var(--paper);}
  #stage{position:fixed;inset:0}
  canvas{display:block}

  /* ── 電視節目框線 ───────────────────────── */
  .vignette{position:fixed;inset:0;pointer-events:none;z-index:5;
    box-shadow:inset 0 0 180px rgba(0,0,0,.65);}
  .scanline{position:fixed;inset:0;pointer-events:none;z-index:5;opacity:.05;
    background:repeating-linear-gradient(0deg,#fff 0 1px,transparent 1px 4px);}

  /* ── 頂部節目標頭 ───────────────────────── */
  #masthead{position:fixed;top:0;left:0;right:0;z-index:20;display:flex;align-items:flex-start;
    justify-content:space-between;padding:14px 18px;pointer-events:none;}
  #showTitle{display:flex;gap:10px;align-items:center;pointer-events:auto}
  #seal{width:46px;height:46px;background:var(--sun);color:#fff;display:flex;align-items:center;justify-content:center;
    font-size:19px;font-weight:900;letter-spacing:2px;writing-mode:vertical-rl;border-radius:4px;
    box-shadow:0 2px 10px rgba(198,57,47,.5);}
  #titleText .big{font-size:clamp(18px,2.6vw,26px);font-weight:900;letter-spacing:4px;
    text-shadow:0 2px 8px #000;}
  #titleText .sub{font-size:11px;letter-spacing:3px;color:var(--qing);opacity:.9;margin-top:2px}
  #dateBox{background:var(--panel);border:1px solid var(--line);padding:6px 12px;border-radius:4px;
    text-align:right;pointer-events:auto;backdrop-filter:blur(4px);}
  #dateBox .era{font-size:10px;letter-spacing:2px;color:var(--qing);opacity:.85}
  #dateBox .date{font-size:17px;font-weight:700;letter-spacing:1px;font-variant-numeric:tabular-nums}

  /* ── 相機與播放控制 ─────────────────────── */
  #controls{position:fixed;top:76px;right:14px;z-index:20;display:flex;flex-direction:column;gap:6px}
  .btn{background:var(--panel);border:1px solid var(--line);color:var(--paper);
    font-family:inherit;font-size:12.5px;letter-spacing:2px;padding:8px 12px;border-radius:4px;cursor:pointer;
    backdrop-filter:blur(4px);transition:all .18s;text-align:center;min-width:96px;}
  .btn:hover{border-color:var(--qing);color:var(--qing)}
  .btn.active{background:linear-gradient(180deg,rgba(240,180,41,.22),rgba(240,180,41,.08));
    border-color:var(--qing);color:var(--qing);font-weight:700}
  .btn.red{border-color:rgba(198,57,47,.6)}
  .btn.red:hover{color:#ff8b80;border-color:#ff8b80}

  /* ── 字幕條（新聞台風格） ────────────────── */
  #subtitle{position:fixed;left:50%;bottom:118px;transform:translateX(-50%);z-index:20;
    max-width:min(760px,92vw);pointer-events:none;text-align:center;
    opacity:0;transition:opacity .4s;}
  #subtitle.show{opacity:1}
  #subTag{display:inline-block;background:var(--sun);color:#fff;font-size:11px;letter-spacing:3px;
    padding:3px 10px;border-radius:2px;margin-bottom:5px;font-weight:700}
  #subTag.q{background:var(--qing);color:#231a02}
  #subTag.j{background:var(--jp)}
  #subText{background:rgba(0,0,0,.72);border-left:3px solid var(--qing);padding:8px 16px;
    font-size:clamp(13px,1.9vw,17px);letter-spacing:1.5px;line-height:1.6;border-radius:2px;
    text-shadow:0 1px 4px #000;}

  /* ── 戰力數據面板 ───────────────────────── */
  #statsPanel{position:fixed;left:14px;top:76px;z-index:20;width:236px;background:var(--panel);
    border:1px solid var(--line);border-radius:6px;backdrop-filter:blur(6px);overflow:hidden;
    transition:transform .3s,opacity .3s;}
  #statsPanel.hide{transform:translateX(-110%);opacity:0}
  #statsHead{padding:8px 12px;font-size:12px;letter-spacing:3px;color:var(--qing);
    border-bottom:1px solid var(--line);display:flex;justify-content:space-between;align-items:center}
  #statsBody{padding:10px 12px;font-size:12px;max-height:52vh;overflow-y:auto}
  #statsBody::-webkit-scrollbar{width:4px}
  #statsBody::-webkit-scrollbar-thumb{background:var(--line)}
  .sideBlock{margin-bottom:10px}
  .sideName{font-size:12.5px;font-weight:700;letter-spacing:2px;padding:3px 8px;border-radius:2px;margin-bottom:6px;display:flex;justify-content:space-between}
  .sideName.q{background:rgba(240,180,41,.16);color:var(--qing);border-left:3px solid var(--qing)}
  .sideName.j{background:rgba(76,127,196,.16);color:#9fc0ee;border-left:3px solid var(--jp)}
  .statRow{display:flex;justify-content:space-between;padding:2px 4px;color:#cfc7b2;letter-spacing:1px}
  .statRow b{color:var(--paper);font-variant-numeric:tabular-nums}
  .shipRow{display:flex;justify-content:space-between;padding:1.5px 4px;font-size:11.3px;color:#b9b19c;font-variant-numeric:tabular-nums}
  .shipRow.dead{color:#7a5148;text-decoration:line-through}
  .shipRow .nm{letter-spacing:1px}
  .divider{height:1px;background:var(--line);margin:8px 0}

  /* ── 事件標題卡（電影式） ────────────────── */
  #eventCard{position:fixed;inset:0;z-index:40;display:flex;align-items:center;justify-content:center;
    pointer-events:none;opacity:0;transition:opacity .6s;background:rgba(0,0,0,.45)}
  #eventCard.show{opacity:1}
  #cardInner{text-align:center;transform:scale(.96);transition:transform .8s}
  #eventCard.show #cardInner{transform:scale(1)}
  #cardDate{font-size:clamp(13px,2vw,17px);letter-spacing:6px;color:var(--qing);margin-bottom:10px}
  #cardTitle{font-size:clamp(30px,6.5vw,58px);font-weight:900;letter-spacing:12px;
    text-shadow:0 4px 24px rgba(0,0,0,.9),0 0 60px rgba(240,180,41,.25);}
  #cardTitle .accent{color:var(--sun)}
  #cardSub{font-size:clamp(12px,1.8vw,15px);letter-spacing:3px;color:#cfc7b2;margin-top:12px;line-height:1.8}
  .cardRule{width:120px;height:2px;margin:14px auto 0;background:linear-gradient(90deg,transparent,var(--qing),transparent)}

  /* ── 時間軸 ────────────────────────────── */
  #timeline{position:fixed;left:50%;bottom:14px;transform:translateX(-50%);z-index:30;
    width:min(880px,94vw);background:var(--panel);border:1px solid var(--line);border-radius:8px;
    padding:10px 14px 12px;backdrop-filter:blur(6px);}
  #tlTop{display:flex;align-items:center;gap:10px;margin-bottom:8px}
  #playBtn{width:34px;height:34px;border-radius:50%;border:1px solid var(--qing);background:rgba(240,180,41,.12);
    color:var(--qing);font-size:14px;cursor:pointer;flex:none;transition:all .2s}
  #playBtn:hover{background:rgba(240,180,41,.28)}
  #phaseName{font-size:14px;font-weight:700;letter-spacing:3px;flex:1;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  #speedBtn{flex:none}
  #track{position:relative;height:30px;cursor:pointer}
  #trackLine{position:absolute;left:0;right:0;top:14px;height:3px;background:rgba(234,224,200,.18);border-radius:2px}
  #trackFill{position:absolute;left:0;top:14px;height:3px;background:linear-gradient(90deg,var(--qing),var(--sun));border-radius:2px;width:0%}
  .node{position:absolute;top:8px;width:15px;height:15px;border-radius:50%;background:#1a2635;
    border:2px solid rgba(234,224,200,.5);transform:translateX(-50%);transition:all .2s;cursor:pointer;z-index:2}
  .node:hover{border-color:var(--qing);transform:translateX(-50%) scale(1.25)}
  .node.done{background:var(--qing);border-color:var(--qing)}
  .node.now{background:var(--sun);border-color:#ffb3aa;box-shadow:0 0 12px rgba(198,57,47,.9)}
  .nodeLabel{position:absolute;top:-13px;left:50%;transform:translateX(-50%);font-size:10px;
    letter-spacing:1px;color:#cfc7b2;white-space:nowrap;pointer-events:none}
  #cursor{position:absolute;top:4px;width:2px;height:22px;background:#fff;transform:translateX(-50%);
    box-shadow:0 0 8px #fff;pointer-events:none;z-index:3}

  /* ── 開場畫面 ──────────────────────────── */
  #intro{position:fixed;inset:0;z-index:60;background:radial-gradient(ellipse at 50% 40%,#12202f 0%,#05090f 70%);
    display:flex;align-items:center;justify-content:center;transition:opacity 1s;}
  #intro.gone{opacity:0;pointer-events:none}
  #introBox{text-align:center;max-width:640px;padding:24px}
  #introEra{font-size:13px;letter-spacing:8px;color:var(--qing);margin-bottom:16px}
  #introTitle{font-size:clamp(42px,10vw,86px);font-weight:900;letter-spacing:18px;line-height:1.15;
    text-shadow:0 0 80px rgba(240,180,41,.3);}
  #introTitle span{color:var(--sun)}
  #introSub{margin-top:16px;font-size:clamp(12px,2vw,15px);letter-spacing:4px;color:#cfc7b2;line-height:2}
  #startBtn{margin-top:30px;background:linear-gradient(180deg,rgba(198,57,47,.9),rgba(140,30,24,.9));
    border:1px solid #ff9a8e;color:#fff;font-family:inherit;font-size:16px;letter-spacing:6px;font-weight:700;
    padding:13px 44px;border-radius:4px;cursor:pointer;transition:all .25s;box-shadow:0 4px 24px rgba(198,57,47,.4)}
  #startBtn:hover{transform:translateY(-2px);box-shadow:0 8px 32px rgba(198,57,47,.6)}
  #introHint{margin-top:18px;font-size:11px;letter-spacing:2px;color:#8d8672;line-height:1.9}
  /* 片頭影片 */
  #videoOverlay{position:fixed;inset:0;z-index:70;background:#000;display:none;
    align-items:center;justify-content:center;flex-direction:column}
  #videoOverlay.show{display:flex}
  #ytBox{position:relative;width:min(92vw,1120px);aspect-ratio:16/9;background:#000;
    box-shadow:0 0 60px rgba(0,0,0,.9);border:1px solid rgba(240,180,41,.25)}
  #ytBox iframe{position:absolute;inset:0;width:100%;height:100%;border:0}
  #skipBtn,#soundBtn{margin-top:18px;background:rgba(10,16,24,.85);color:#e8dfc8;border:1px solid rgba(240,180,41,.5);
    padding:10px 34px;font-family:inherit;font-size:14px;letter-spacing:6px;cursor:pointer;transition:.25s}
  #skipBtn:hover,#soundBtn:hover{background:rgba(240,180,41,.15)}
  #vidLoading{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;
    color:#8d8672;font-size:13px;letter-spacing:4px;pointer-events:none}
  .flagStrip{display:flex;justify-content:center;gap:18px;margin-top:22px;align-items:center}
  .flagStrip canvas{border:1px solid rgba(255,255,255,.25);border-radius:2px;box-shadow:0 3px 14px rgba(0,0,0,.6)}
  .vs{font-size:14px;color:var(--sun);letter-spacing:2px;font-weight:900}

  #toast{position:fixed;top:76px;left:50%;transform:translateX(-50%);z-index:50;background:var(--panel);
    border:1px solid var(--line);padding:6px 16px;border-radius:20px;font-size:12px;letter-spacing:2px;
    opacity:0;transition:opacity .3s;pointer-events:none}

  @media (max-width:720px){
    #statsPanel{width:196px;top:120px}
    #controls{top:120px}
    .btn{min-width:84px;padding:7px 8px;font-size:11px}
    #subtitle{bottom:132px}
    .nodeLabel{display:none}
  }
</style>
</head>
<body>
<div id="stage"></div>
<div class="vignette"></div><div class="scanline"></div>

<header id="masthead">
  <div id="showTitle">
    <div id="seal">甲午</div>
    <div id="titleText">
      <div class="big">甲午戰爭　1894–1895</div>
      <div class="sub">歷史特別節目 ─ 3D 戰場全紀錄</div>
    </div>
  </div>
  <div id="dateBox">
    <div class="era">光緒二十年／明治二十七年</div>
    <div class="date" id="dateText">1894.07.25</div>
  </div>
</header>

<div id="controls">
  <button class="btn active" id="camCine">跟隨運鏡</button>
  <button class="btn" id="camFree">自由視角</button>
  <button class="btn" id="camBird">鳥瞰視角</button>
  <button class="btn" id="camSea">海平面視角</button>
  <button class="btn red" id="statsToggle">戰力數據</button>
</div>

<div id="statsPanel"><div id="statsHead"><span>雙方戰力</span><span id="statsPhase"></span></div><div id="statsBody"></div></div>

<div id="subtitle"><span id="subTag">戰報</span><div id="subText"></div></div>

<div id="eventCard"><div id="cardInner">
  <div id="cardDate"></div><div id="cardTitle"></div>
  <div class="cardRule"></div><div id="cardSub"></div>
</div></div>

<div id="timeline">
  <div id="tlTop">
    <button id="playBtn">▶</button>
    <div id="phaseName">－</div>
    <button class="btn" id="speedBtn" style="min-width:64px">1×</button>
  </div>
  <div id="track"><div id="trackLine"></div><div id="trackFill"></div><div id="nodes"></div><div id="cursor"></div></div>
</div>

<div id="intro">
  <div id="introBox">
    <div id="introEra">光緒二十年 ─ 明治二十七年</div>
    <div id="introTitle">甲午<span>戰爭</span></div>
    <div id="introSub">大清北洋水師 × 大日本帝國聯合艦隊<br>從豐島海戰到威海衛陷落 ─ 二百七十日的海陸決戰</div>
    <div class="flagStrip">
      <canvas id="introFlagQ" width="96" height="64"></canvas>
      <span class="vs">對決</span>
      <canvas id="introFlagJ" width="96" height="64"></canvas>
    </div>
    <button id="startBtn">開始播映</button>
    <div id="introHint">拖曳旋轉鏡頭　·　滾輪／雙指縮放　·　時間軸節點可跳轉戰役<br>建議搭配「跟隨運鏡」觀看完整戰役演出</div>
  </div>
</div>

<div id="videoOverlay">
  <div id="ytBox"><div id="vidLoading">影片載入中⋯</div><div id="ytPlayer"></div></div>
  <div style="display:flex;gap:14px;align-items:center">
    <button id="soundBtn" style="display:none">🔊 開啟聲音</button>
    <button id="skipBtn">跳過片頭 ▶</button>
  </div>
</div>

<div id="toast"></div>
<script>
/* ═══════════════════════════════════════════════════════════
   甲午戰爭 3D 特別節目 ─ 核心程式
   ═══════════════════════════════════════════════════════════ */
'use strict';
if(!CanvasRenderingContext2D.prototype.roundRect){
  CanvasRenderingContext2D.prototype.roundRect = function(x,y,w,h,r){
    r=Math.min(r,w/2,h/2);
    this.moveTo(x+r,y); this.arcTo(x+w,y,x+w,y+h,r); this.arcTo(x+w,y+h,x,y+h,r);
    this.arcTo(x,y+h,x,y,r); this.arcTo(x,y,x+w,y,r); this.closePath(); return this;
  };
}
const COL = {
  qing: 0xF0B429, qingDark: 0x9c7412,
  jp: 0x4C7FC4, jpDark: 0x2a4d80,
  hull: 0x3a4148, hullQ: 0x4a4436, hullJ: 0x39424f,
  fire: 0xffa32b, sea: 0x16405e,
};

/* ── 地理座標 → 世界座標（經度119–130 / 緯度34–41.5） ── */
function GEO(lon, lat){ return { x:(lon-124.6)*62, z:-(lat-38.1)*78 }; }
const PLACES = [
  {n:'平壤',    lon:125.75, lat:39.03, land:1, big:1},
  {n:'漢城',    lon:126.98, lat:37.57, land:1},
  {n:'仁川',    lon:126.62, lat:37.46, land:1},
  {n:'牙山',    lon:127.00, lat:36.79, land:1},
  {n:'豐島',    lon:126.25, lat:37.18, land:0},
  {n:'大東溝',  lon:124.15, lat:39.83, land:1},
  {n:'黃海海戰海域', lon:123.55, lat:39.15, land:0, big:1},
  {n:'鴨綠江',  lon:124.4,  lat:40.1,  land:1},
  {n:'旅順',    lon:121.26, lat:38.83, land:1, big:1},
  {n:'大連灣',  lon:121.65, lat:38.95, land:1},
  {n:'威海衛',  lon:122.12, lat:37.52, land:1, big:1},
  {n:'劉公島',  lon:122.19, lat:37.60, land:0},
  {n:'煙台',    lon:121.39, lat:37.54, land:1},
  {n:'天津',    lon:117.9,  lat:39.05, land:1},
  {n:'渤海',    lon:119.9,  lat:38.7,  land:0},
  {n:'黃海',    lon:123.5,  lat:36.6,  land:0, big:1},
];

/* ── 軍旗繪製（Canvas 貼圖） ───────────────────────── */
function drawQingFlag(ctx, w, h){          /* 黃龍旗 */
  ctx.fillStyle = '#f2b62a'; ctx.fillRect(0,0,w,h);
  const s = w/96;
  /* 紅日珠 */
  ctx.fillStyle = '#d0342a';
  ctx.beginPath(); ctx.arc(70*s, 16*s, 6.5*s, 0, Math.PI*2); ctx.fill();
  /* 青龍身軀（簡化 S 形） */
  ctx.strokeStyle = '#1f4f8f'; ctx.lineWidth = 7*s; ctx.lineCap='round';
  ctx.beginPath();
  ctx.moveTo(14*s, 50*s);
  ctx.bezierCurveTo(28*s, 26*s, 44*s, 58*s, 60*s, 34*s);
  ctx.quadraticCurveTo(66*s, 24*s, 62*s, 18*s);
  ctx.stroke();
  /* 龍首 */
  ctx.fillStyle = '#1f4f8f';
  ctx.beginPath(); ctx.arc(62*s, 18*s, 6*s, 0, Math.PI*2); ctx.fill();
  ctx.fillStyle = '#f2b62a';
  ctx.beginPath(); ctx.arc(63.5*s, 16.5*s, 1.6*s, 0, Math.PI*2); ctx.fill();
  /* 龍角、鬚 */
  ctx.strokeStyle = '#1f4f8f'; ctx.lineWidth = 2*s;
  ctx.beginPath(); ctx.moveTo(60*s,12*s); ctx.lineTo(56*s,6*s); ctx.moveTo(65*s,12*s); ctx.lineTo(67*s,5*s); ctx.stroke();
  /* 爪 */
  ctx.lineWidth = 3*s;
  [[26,44],[44,46]].forEach(p=>{ ctx.beginPath(); ctx.moveTo(p[0]*s,p[1]*s); ctx.lineTo((p[0]-3)*s,(p[1]+9)*s);
    ctx.moveTo(p[0]*s,p[1]*s); ctx.lineTo((p[0]+4)*s,(p[1]+9)*s); ctx.stroke(); });
  /* 火焰緣 */
  ctx.strokeStyle = 'rgba(208,52,42,.55)'; ctx.lineWidth = 1.5*s;
  ctx.beginPath(); ctx.moveTo(20*s,54*s); ctx.quadraticCurveTo(36*s,60*s,52*s,52*s); ctx.stroke();
}
function drawRisingSunFlag(ctx, w, h){     /* 旭日旗 */
  ctx.fillStyle = '#f5f2ea'; ctx.fillRect(0,0,w,h);
  const cx = w*0.42, cy = h*0.5, R = Math.max(w,h)*1.5, r = h*0.24;
  ctx.fillStyle = '#c6392f';
  for(let i=0;i<16;i++){
    if(i%2) continue;
    const a0 = (i/16)*Math.PI*2 - Math.PI/32, a1 = a0 + Math.PI/16;
    ctx.beginPath(); ctx.moveTo(cx,cy);
    ctx.lineTo(cx+Math.cos(a0)*R, cy+Math.sin(a0)*R);
    ctx.lineTo(cx+Math.cos(a1)*R, cy+Math.sin(a1)*R);
    ctx.closePath(); ctx.fill();
  }
  ctx.beginPath(); ctx.arc(cx,cy,r,0,Math.PI*2); ctx.fill();
}
function makeFlagTexture(kind, w=128, h=84){
  const cv = document.createElement('canvas'); cv.width=w; cv.height=h;
  const ctx = cv.getContext('2d');
  (kind==='q'?drawQingFlag:drawRisingSunFlag)(ctx,w,h);
  const tx = new THREE.CanvasTexture(cv); tx.anisotropy=4; return tx;
}
/* 開場畫面小旗 */
drawQingFlag(document.getElementById('introFlagQ').getContext('2d'),96,64);
drawRisingSunFlag(document.getElementById('introFlagJ').getContext('2d'),96,64);
const FLAG_TEX = { q: makeFlagTexture('q'), j: makeFlagTexture('j') };

/* ── 文字看板（Sprite） ───────────────────────────── */
function makeLabelSprite(text, opt={}){
  const fs = opt.fs||34, pad=14;
  const cv = document.createElement('canvas'), ctx = cv.getContext('2d');
  ctx.font = `${opt.bold?'900':'700'} ${fs}px "Noto Serif TC","Songti TC",serif`;
  const tw = ctx.measureText(text).width;
  cv.width = tw + pad*2 + (opt.tag? fs+14 : 0); cv.height = fs + pad*1.6;
  ctx.font = `${opt.bold?'900':'700'} ${fs}px "Noto Serif TC","Songti TC",serif`;
  ctx.textBaseline='middle';
  if(opt.bg){ ctx.fillStyle = opt.bg;
    ctx.beginPath(); ctx.roundRect(0,0,cv.width,cv.height,8); ctx.fill(); }
  if(opt.border){ ctx.strokeStyle=opt.border; ctx.lineWidth=3;
    ctx.beginPath(); ctx.roundRect(2,2,cv.width-4,cv.height-4,7); ctx.stroke(); }
  let tx0 = pad;
  if(opt.tag){ ctx.fillStyle = opt.tagColor||'#c6392f';
    ctx.beginPath(); ctx.roundRect(8, cv.height*0.18, fs*0.9, cv.height*0.64, 4); ctx.fill();
    ctx.fillStyle='#fff'; ctx.font=`900 ${fs*0.62}px serif`; ctx.textAlign='center';
    ctx.fillText(opt.tag, 8+fs*0.45, cv.height/2+1); ctx.textAlign='left';
    ctx.font = `${opt.bold?'900':'700'} ${fs}px "Noto Serif TC","Songti TC",serif`;
    tx0 = fs+18; }
  ctx.shadowColor='rgba(0,0,0,.85)'; ctx.shadowBlur=6;
  ctx.fillStyle = opt.color||'#EAE0C8';
  ctx.fillText(text, tx0, cv.height/2+1);
  const tex = new THREE.CanvasTexture(cv); tex.anisotropy=4;
  const sp = new THREE.Sprite(new THREE.SpriteMaterial({map:tex, transparent:true, depthWrite:false}));
  const sc = opt.scale||0.11;
  sp.scale.set(cv.width*sc, cv.height*sc, 1);
  sp.renderOrder = 10;
  return sp;
}

const BUMPS = [];
function coastLine(pts, r, h, step=0.22){   /* 沿線佈山丘 */
  for(let i=0;i<pts.length-1;i++){
    const a=pts[i], b=pts[i+1];
    const d = Math.hypot(b[0]-a[0], b[1]-a[1]);
    const n = Math.max(1, Math.round(d/step));
    for(let k=0;k<=n;k++){
      const lon=a[0]+(b[0]-a[0])*k/n, lat=a[1]+(b[1]-a[1])*k/n;
      const g=GEO(lon,lat);
      BUMPS.push({x:g.x, z:g.z, r:r*62*(0.85+Math.random()*0.35), h:h*(0.8+Math.random()*0.5)});
    }
  }
}

const TERRAIN_SIZE_X = 760, TERRAIN_SIZE_Z = 640;
function groundHeight(x,z){
  let h=-7;
  for(let i=0;i<BUMPS.length;i++){
    const b=BUMPS[i], dx=x-b.x, dz=z-b.z, d2=dx*dx+dz*dz, r2=b.r*b.r;
    if(d2 < r2*9) h += b.h*Math.exp(-d2/(r2*1.35));
  }
  return h;
}
(function buildTerrain(){
  const seg = 190;
  const g = new THREE.PlaneGeometry(TERRAIN_SIZE_X, TERRAIN_SIZE_Z, seg, Math.round(seg*TERRAIN_SIZE_Z/TERRAIN_SIZE_X));
  g.rotateX(-Math.PI/2);
  const pos = g.attributes.position, colors=[];
  const cDeep=new THREE.Color(0x233324), cLow=new THREE.Color(0x4a6b3a), cMid=new THREE.Color(0x6b7a45),
        cHi=new THREE.Color(0x8a7a58), cSnow=new THREE.Color(0xcfcabb), cSand=new THREE.Color(0x9a8f66);
  for(let i=0;i<pos.count;i++){
    const x=pos.getX(i), z=pos.getZ(i);
    let h=groundHeight(x,z);
    h += (Math.sin(x*0.11)*Math.cos(z*0.09))*1.4;   /* 細碎起伏 */
    pos.setY(i,h);
    const c=new THREE.Color();
    if(h<0.4)      c.copy(cSand);
    else if(h<6)   c.copy(cSand).lerp(cLow,(h-0.4)/5.6);
    else if(h<16)  c.copy(cLow).lerp(cMid,(h-6)/10);
    else if(h<30)  c.copy(cMid).lerp(cHi,(h-16)/14);
    else           c.copy(cHi).lerp(cSnow,Math.min(1,(h-30)/16));
    c.offsetHSL(0,(Math.random()-0.5)*0.03,(Math.random()-0.5)*0.035);
    colors.push(c.r,c.g,c.b);
  }
  g.setAttribute('color', new THREE.Float32BufferAttribute(colors,3));
  g.computeVertexNormals();
  const m = new THREE.Mesh(g, new THREE.MeshLambertMaterial({vertexColors:true}));
  m.receiveShadow = true;
  scene.add(m);
})();

function makeHullGeometry(L, W, H){
  /* 尖艏收艉的船殼 */
  const shape = new THREE.Shape();
  const hl=L/2, hw=W/2;
  shape.moveTo(-hl*0.82, -hw*0.7);
  shape.lineTo(hl*0.55, -hw);
  shape.quadraticCurveTo(hl*1.02, -hw*0.35, hl*1.06, 0);
  shape.quadraticCurveTo(hl*1.02, hw*0.35, hl*0.55, hw);
  shape.lineTo(-hl*0.82, hw*0.7);
  shape.quadraticCurveTo(-hl*1.0, 0, -hl*0.82, -hw*0.7);
  const g = new THREE.ExtrudeGeometry(shape,{depth:H, bevelEnabled:true, bevelSize:W*0.1, bevelThickness:H*0.25, bevelSegments:1});
  g.rotateX(-Math.PI/2);
  g.translate(0,H*0.2,0);
  return g;
}
function makeShip(def){

  for(let i=0;i<2;i++){

    f.position.set(-L*0.10 - i*L*0.15, H*2.0, 0); grp.add(f);
    const ring = new THREE.Mesh(new THREE.CylinderGeometry(W*0.17, W*0.17, H*0.2, 8), isQ?shipMats.bandQ:shipMats.bandJ);
    ring.position.copy(f.position); ring.position.y += H*0.55; grp.add(ring);
    funnelPos.push(new THREE.Vector3(f.position.x, H*2.8, 0));

  /* 主砲（艏艉） */
  const gunPts = [];
  [[L*0.36,0],[ -L*0.42,0]].forEach(p=>{
    const base = new THREE.Mesh(new THREE.CylinderGeometry(W*0.24,W*0.28,H*0.4,8), shipMats.gun);
    base.position.set(p[0], H*1.35, p[1]); grp.add(base);
    const brl = new THREE.Mesh(new THREE.CylinderGeometry(W*0.05,W*0.06,L*0.16,6), shipMats.gun);
    brl.rotation.z = Math.PI/2; brl.position.set(p[0]+ (p[0]>0? L*0.08 : -L*0.08), H*1.5, p[1]); grp.add(brl);
    gunPts.push(new THREE.Vector3(p[0], H*1.5, p[1]));
  });
  /* 桅杆 ×2 + 軍艦旗 */
  [[L*0.28],[ -L*0.3]].forEach((p,i)=>{
    const m = new THREE.Mesh(new THREE.CylinderGeometry(0.14,0.2,H*3.6,5), shipMats.mast);
    m.position.set(p[0], H*2.6, 0); grp.add(m);
    if(i===1){
      const flag = new THREE.Mesh(new THREE.PlaneGeometry(L*0.2, L*0.13),
        new THREE.MeshBasicMaterial({map:FLAG_TEX[def.side], side:THREE.DoubleSide}));
      flag.position.set(p[0]-L*0.11, H*4.0, 0);
      grp.add(flag); grp.userData.flag = flag;
    }
  });
  /* 艦艏浪花 */
  const wake = new THREE.Mesh(new THREE.PlaneGeometry(L*1.7, W*2.6),
    new THREE.MeshBasicMaterial({color:0xbfe4f5, transparent:true, opacity:0, depthWrite:false}));
  wake.rotation.x = -Math.PI/2; wake.position.y = 0.35; wake.position.x = -L*0.15;

    scale:0.075

      bg: isQ?'rgba(146,104,10,.9)':'rgba(38,74,128,.9)', border:'rgba(255,255,255,.5)',
      tag: isQ?'清':'日', tagColor: isQ?'#c6392f':'#c6392f', scale:0.088});
    c.position.y = H*5.4 + 7; grp.add(c);

}

function circleSpriteTex(inner='rgba(255,255,255,1)', outer='rgba(255,255,255,0)'){
  const cv=document.createElement('canvas'); cv.width=cv.height=64;
  const ctx=cv.getContext('2d');
  const g=ctx.createRadialGradient(32,32,2,32,32,30);
  g.addColorStop(0,inner); g.addColorStop(1,outer);
  ctx.fillStyle=g; ctx.fillRect(0,0,64,64);
  return new THREE.CanvasTexture(cv);
}
const TEX_GLOW = circleSpriteTex();
const TEX_SMOKE = circleSpriteTex('rgba(200,200,200,.9)','rgba(120,120,120,0)');

const FX = { smoke:[], flash:[], shells:[], splash:[], fires:[], torps:[], snow:null };
const smokePool = [];
function spawnSmoke(pos, opt={}){
  let p = smokePool.pop();

    p = new THREE.Sprite(new THREE.SpriteMaterial({map:TEX_SMOKE, transparent:true, depthWrite:false}));
    scene.add(p);

  p.visible = true;
  p.position.copy(pos);
  p.material.color.setHex(opt.color!==undefined?opt.color:0x555a60);
  p.material.opacity = opt.op||0.5;
  p.userData = { life:0, max:opt.max||3.2, grow:opt.grow||3.2, size:opt.size||3, opBase:opt.op||0.5,
    vel: opt.vel|| new THREE.Vector3((Math.random()-.5)*1.2, 2.4+Math.random()*1.6, (Math.random()-.5)*1.2) };
  p.scale.setScalar(p.userData.size);

}

function fireShell(from, to, opt={}){
  const m = new THREE.Mesh(new THREE.SphereGeometry(0.42,6,5),
    new THREE.MeshBasicMaterial({color:0xffd9a0}));

    blending:THREE.AdditiveBlending, depthWrite:false, opacity:.9}));

  scene.add(m);
  const d = from.distanceTo(to);
  FX.shells.push({m, from:from.clone(), to:to.clone(), t:0,
    dur: Math.max(0.7, d/110)*(opt.slow||1), arc: d*0.16+4,
    hit: opt.hit!==false, big: opt.big||1, onHit: opt.onHit});
  spawnFlash(from, 5+Math.random()*3, 0xffe0a0, 0.13);
  spawnSmoke(from, {color:0xb9b3a4, op:.6, size:2, grow:3, max:1.4});

}

function fireTorpedo(from, target, onHit){
  const g = new THREE.Group();

/* ── 特效更新 ── */
const _v1 = new THREE.Vector3(), _v2 = new THREE.Vector3();
function updateFX(dt, now){
  /* 煙霧 */
  for(let i=FX.smoke.length-1;i>=0;i--){
    const p=FX.smoke[i], u=p.userData;
    u.life+=dt;
    if(u.life>=u.max){ p.visible=false; FX.smoke.splice(i,1); smokePool.push(p); continue; }
    const k=u.life/u.max;
    p.position.addScaledVector(u.vel,dt);
    u.vel.x += windX*dt; u.vel.y *= (1-0.35*dt);
    p.scale.setScalar(u.size + u.grow*k*3);
    p.material.opacity = (1-k)*(u.opBase|| .55);
  }
  /* 閃光 */
  for(let i=FX.flash.length-1;i>=0;i--){
    const f=FX.flash[i]; f.userData.life+=dt;
    const k=f.userData.life/f.userData.max;
    if(k>=1){ scene.remove(f); f.material.dispose(); FX.flash.splice(i,1); continue; }
    f.scale.setScalar(f.userData.size*(1+k*1.6));
    f.material.opacity = 1-k;
  }
  /* 砲彈 */
  for(let i=FX.shells.length-1;i>=0;i--){
    const s=FX.shells[i]; s.t+=dt/s.dur;
    if(s.t>=1){
      scene.remove(s.m);
      const end = s.to;
      if(s.hit){ spawnExplosion(end.clone().setY(Math.max(end.y,2)), s.big); if(s.onHit) s.onHit(); }
      else spawnSplash(end);
      FX.shells.splice(i,1); continue;
    }
    const t=s.t;
    s.m.position.lerpVectors(s.from,s.to,t);
    s.m.position.y += Math.sin(t*Math.PI)*s.arc;
  }
  /* 魚雷 */
  for(let i=FX.torps.length-1;i>=0;i--){
    const tp=FX.torps[i]; tp.t+=dt/tp.dur;
    const tgt=_v1.copy(tp.target.position); tgt.y=0.4;
    if(tp.t>=1){
      scene.remove(tp.g);
      spawnExplosion(tgt.clone().setY(1.5), 2.2);
      /* 水柱 */
      for(let k=0;k<8;k++) spawnSmoke(tgt,{color:0xd8ecf7,op:.85,size:2,grow:4,max:1.3,
        vel:new THREE.Vector3((Math.random()-.5)*3, 9+Math.random()*7,(Math.random()-.5)*3)});
      if(tp.onHit) tp.onHit();
      FX.torps.splice(i,1); continue;
    }
    tp.g.position.lerpVectors(tp.from, tgt, tp.t);
    tp.g.position.y = 0.4;
    tp.g.lookAt(tgt.x, 0.4, tgt.z); tp.g.rotateY(Math.PI/2);
    tp.wakeAcc+=dt;
    if(tp.wakeAcc>0.05){ tp.wakeAcc=0;
      spawnSmoke(tp.g.position.clone().setY(0.5),{color:0xeaf6ff,op:.7,size:1,grow:1.6,max:1.1,
        vel:new THREE.Vector3(0,0.6,0)});
    }
  }
  /* 持續火災 */
  for(let i=FX.fires.length-1;i>=0;i--){
    const f=FX.fires[i];
    if(!f.ship.visible){ FX.fires.splice(i,1); continue; }
    f.acc+=dt;
    if(f.acc>0.09){ f.acc=0;
      const p=_v2.copy(f.offset).applyQuaternion(f.ship.quaternion).add(f.ship.position);
      spawnSmoke(p,{color:0xff7a20,op:.9,size:1.4,grow:1.8,max:.5,vel:new THREE.Vector3((Math.random()-.5),3.5,(Math.random()-.5))});
      spawnSmoke(p,{color:0x1c1c1c,op:.7,size:2,grow:4.5,max:3,vel:new THREE.Vector3((Math.random()-.5)*1.5,3,(Math.random()-.5)*1.5)});
    }
  }
}

/* ── 天氣系統 ── */
let windX = 0.6;
let snowSys = null;
function setSnow(on){
  if(on && !snowSys){
    const N=1400, g=new THREE.BufferGeometry(), arr=new Float32Array(N*3);
    for(let i=0;i<N;i++){ arr[i*3]=(Math.random()-.5)*900; arr[i*3+1]=Math.random()*260; arr[i*3+2]=(Math.random()-.5)*800; }
    g.setAttribute('position', new THREE.BufferAttribute(arr,3));
    snowSys = new THREE.Points(g, new THREE.PointsMaterial({color:0xe8f0f8,size:1.6,transparent:true,opacity:.85,map:TEX_GLOW,depthWrite:false}));
    scene.add(snowSys);
  }
  if(snowSys) snowSys.visible = on;
}
function updateSnow(dt, center){
  if(!snowSys || !snowSys.visible) return;
  const a = snowSys.geometry.attributes.position.array;
  for(let i=0;i<a.length;i+=3){
    a[i+1]-=dt*26; a[i]+=windX*dt*14 + Math.sin((a[i+1])*0.06)*dt*8;
    if(a[i+1]<0){ a[i+1]=250; a[i]=center.x+(Math.random()-.5)*900; a[i+2]=center.z+(Math.random()-.5)*800; }
  }
  snowSys.geometry.attributes.position.needsUpdate = true;
}

};
const wCur = JSON.parse(JSON.stringify(skyPresets.clear)); let wTarget = skyPresets.clear;
function setWeather(name, snow){
  wTarget = skyPresets[name]||skyPresets.clear;
  setSnow(!!snow);
}
function updateWeather(dt){
  const k = Math.min(1, dt*1.2);
  ['fogNear','fogFar','sunI','wave'].forEach(p=> wCur[p]+= (wTarget[p]-wCur[p])*k);
  ['top','bot','fog','sunC'].forEach(p=>{
    const c=new THREE.Color(wCur[p]), t=new THREE.Color(wTarget[p]);
    c.lerp(t,k); wCur[p]=c.getHex();
  });
  skyMat.uniforms.top.value.setHex(wCur.top);
  skyMat.uniforms.bot.value.setHex(wCur.bot);
  scene.fog.color.setHex(wCur.fog);
  scene.background.set(wCur.fog);
  scene.fog.near = wCur.fogNear; scene.fog.far = wCur.fogFar;
  sun.intensity = wCur.sunI; sun.color.setHex(wCur.sunC);
  waveAmp = wCur.wave;
}

/* ── 簡易音效（Web Audio） ── */
let AC=null, lastGun=0, lastBoom=0;
function initAudio(){ try{ AC = new (window.AudioContext||window.webkitAudioContext)(); }catch(e){} }
function noiseBurst(dur, vol, lp){
  if(!AC) return;
  const n = AC.sampleRate*dur, buf=AC.createBuffer(1,n,AC.sampleRate), d=buf.getChannelData(0);
  for(let i=0;i<n;i++) d[i]=(Math.random()*2-1)*Math.pow(1-i/n,2.2);
  const src=AC.createBufferSource(); src.buffer=buf;
  const f=AC.createBiquadFilter(); f.type='lowpass'; f.frequency.value=lp;
  const g=AC.createGain(); g.gain.value=vol;
  src.connect(f); f.connect(g); g.connect(AC.destination); src.start();
}
function gunSound(){ const t=performance.now(); if(t-lastGun<70) return; lastGun=t; noiseBurst(0.16, .10, 900); }
function boomSound(big){ const t=performance.now(); if(t-lastBoom<160) return; lastBoom=t; noiseBurst(0.7+big*0.15, .16, 320); }

/* ═══════════════════════════════════════════════════
   演出引擎：路徑、陣型、單縱陣、交火、腳本、時間軸
   ═══════════════════════════════════════════════════ */
function P3(lon,lat,alt){ const g=GEO(lon,lat); return new THREE.Vector3(g.x, alt||0, g.z); }
function evalPath(path, t){
  if(t<=path[0].t){ const g=GEO(path[0].p[0],path[0].p[1]); return {x:g.x,z:g.z,before:t<path[0].t}; }
  const last=path[path.length-1];
  if(t>=last.t){ const g=GEO(last.p[0],last.p[1]); return {x:g.x,z:g.z}; }
  for(let i=0;i<path.length-1;i++){
    const a=path[i], b=path[i+1];
    if(t>=a.t && t<=b.t){
      let k=(t-a.t)/(b.t-a.t);
      k = k*k*(3-2*k); /* smoothstep 平滑加減速 */
      const ga=GEO(a.p[0],a.p[1]), gb=GEO(b.p[0],b.p[1]);
      return {x:ga.x+(gb.x-ga.x)*k, z:ga.z+(gb.z-ga.z)*k};
    }
  }
  const g=GEO(last.p[0],last.p[1]); return {x:g.x,z:g.z};
}
function pathPose(path, t){
  const p = evalPath(path,t), q = evalPath(path, Math.min(t+0.008, path[path.length-1].t+0.008));
  let dx=q.x-p.x, dz=q.z-p.z;
  const spd = Math.hypot(dx,dz);
  return {x:p.x, z:p.z, dx, dz, spd, before:p.before};
}

/* ── 演員（Actor）建立 ── */
let actors = [];          /* 當前戰役全部單位 */
let actorMap = {};        /* name → THREE.Group */
const phaseCache = {};
function buildPhase(ph){
  if(phaseCache[ph.id]) return phaseCache[ph.id];
  const list = [];
  function addShip(def, resolver){
    if(def.tiny){ def.tons = 120; }
    const g = makeShip(def);
    if(def.tiny) g.scale.setScalar(0.5);
    list.push({g, def, resolver, kind:'ship'});
  }
  (ph.units||[]).forEach(def=>{
    if(def.type==='army'){
      const g = makeArmy(def);
      list.push({g, def, kind:'army', resolver:(t)=>{
        const pp = pathPose(def.path, t);
        return {x:pp.x, z:pp.z, dx:pp.dx, dz:pp.dz, spd:pp.spd, visible:!pp.before};
      }});
    } else {
      addShip(def, (t)=>{ const pp=pathPose(def.path,t); return {x:pp.x,z:pp.z,dx:pp.dx,dz:pp.dz,spd:pp.spd,visible:!pp.before}; });
    }
  });
  (ph.columns||[]).forEach(col=>{
    col.members.forEach((m,i)=>{
      const def = m.def||m, detach = m.detach;
      addShip(def, (t)=>{
        if(detach && t>=detach.t){
          const pp = pathPose(detach.path, t);
          return {x:pp.x,z:pp.z,dx:pp.dx,dz:pp.dz,spd:pp.spd,visible:true};
        }
        const tt = t - i*col.gapT;
        const pp = pathPose(col.path, Math.max(col.path[0].t, tt));
        return {x:pp.x,z:pp.z,dx:pp.dx,dz:pp.dz,spd:pp.spd, visible: tt>=col.path[0].t-0.001};
      });
    });
  });
  (ph.formations||[]).forEach(fm=>{
    fm.members.forEach(m=>{
      const def = m.def, detach = m.detach;
      addShip(def, (t)=>{
        if(detach && t>=detach.t){
          const pp = pathPose(detach.path, t);
          return {x:pp.x,z:pp.z,dx:pp.dx,dz:pp.dz,spd:pp.spd,visible:true};
        }
        const c = pathPose(fm.path, t);
        let fx=c.dx, fz=c.dz, L=Math.hypot(fx,fz);
        if(L<1e-4){ fx=-0.7; fz=0.7; L=1; }
        fx/=L; fz/=L;
        const rx=-fz, rz=fx;
        /* 雙縱陣 → 雁行陣 的展開（t 0.05→0.2） */
        const k = THREE.MathUtils.smoothstep(t, 0.05, 0.2);
        const f = m.o0.f+(m.o1.f-m.o0.f)*k, r = m.o0.r+(m.o1.r-m.o0.r)*k;
        return {x:c.x+fx*f+rx*r, z:c.z+fz*f+rz*r, dx:fx, dz:fz, spd:c.spd, visible:true};
      });
    });
  });
  phaseCache[ph.id] = list;
  return list;
}

/* ── 單位每幀更新 ── */
function updateActors(t, dt, now){
  for(const a of actors){
    const g=a.g, ud=g.userData, def=a.def;
    const pose = a.resolver(t);
    if(pose.visible===false){ g.visible=false; continue; }

    const sunk = def.sinkAt!==undefined && t>def.sinkAt;
    const sinkK = sunk? Math.min(1,(t-def.sinkAt)/0.055) : 0;
    if(a.kind==='ship' && sunk && sinkK>=1 && def.sinkStyle!=='ground'){ g.visible=false; continue; }
    g.visible=true;

    if(pose.dx*pose.dx+pose.dz*pose.dz>1e-6 && !sunk)
      ud.heading = Math.atan2(-pose.dz, pose.dx);
    g.rotation.set(0,ud.heading,0);
    g.position.x = pose.x; g.position.z = pose.z;

    if(a.kind==='ship'){
      const bob = seaHeightAt(pose.x,pose.z,now)*0.45;
      if(!sunk){
        g.position.y = bob;
        g.rotation.z = Math.sin(now*0.9+pose.x)*0.02*waveAmp;
        g.rotation.x += Math.sin(now*0.7+pose.z)*0.015*waveAmp;
      } else if(def.sinkStyle==='ground'){
        g.position.y = -ud.H*1.1*sinkK + bob*0.3;
        g.rotation.z = 0.22*sinkK;
      } else {
        g.position.y = bob - sinkK*sinkK*(ud.H*6+6);
        g.rotation.x += -0.6*sinkK;      /* 艦艏下沉 */
        g.rotation.z = 0.5*sinkK;
      }
      /* 航行黑煙 */
      const moving = pose.spd>0.06 && !sunk;
      ud.smokeAcc += dt;
      if(playing && ud.smokeAcc>0.13){
        ud.smokeAcc=0;
        if(moving) ud.funnelPos.forEach(fp=>{
          spawnSmoke(_v1.copy(fp).applyQuaternion(g.quaternion).add(g.position),
            {color:0x22262b, op:.42, size:1.6*ud.s, grow:2.8*ud.s, max:2.6,
             vel:new THREE.Vector3(-Math.cos(ud.heading)*3+windX, 2.2, Math.sin(ud.heading)*3)});
        });
        /* 起火燃燒（沉沒前後） */
        if(def.sinkAt!==undefined && t>def.sinkAt-0.04 && sinkK<1){
          const p=g.position.clone(); p.y+=ud.H*1.6;
          spawnSmoke(p,{color:0xff7a20,op:.95,size:1.6*ud.s,grow:2,max:.5,vel:new THREE.Vector3((Math.random()-.5)*2,4,(Math.random()-.5)*2)});
          spawnSmoke(p,{color:0x141414,op:.8,size:2.4*ud.s,grow:5,max:3.4,vel:new THREE.Vector3((Math.random()-.5),3.4,(Math.random()-.5))});
        }
      }
      if(ud.wake) ud.wake.material.opacity = moving? 0.16:0;
      if(ud.flag) ud.flag.rotation.y = Math.sin(now*3+pose.x)*0.25;
    } else {
      /* 陸軍 */
      g.position.y = Math.max(0.5, groundHeight(pose.x,pose.z));
      const dead = def.dieAt!==undefined && t>def.dieAt;
      g.scale.y = dead? 0.3 : 1;
      if(ud.flag){ ud.flag.rotation.y = Math.sin(now*2.6+pose.z)*0.3; ud.flag.visible=!dead; }
      if(dead && playing && Math.random()<dt*2.2){
        spawnSmoke(g.position.clone().add(new THREE.Vector3(0,3,0)),{color:0x2c2c2c,op:.5,size:3,grow:4,max:2.5});
      }
    }
  }
}

/* ── 交火系統 ── */
const combatAcc = new Map();
function shipVolley(from, to){
  for(let i=0;i<3;i++){
    setTimeout(()=>{
      if(!from.visible) return;
      const gp = from.userData.gunPts? _v1.copy(from.userData.gunPts[i%2]).applyQuaternion(from.quaternion).add(from.position).clone() : from.position.clone().setY(3);
      const tgt = (to.position||to).clone().add(new THREE.Vector3((Math.random()-.5)*10,1.5,(Math.random()-.5)*10));
      fireShell(gp, tgt, {hit:Math.random()<0.5, big:1.4});
    }, i*140);
  }
}
function updateCombat(ph, t, dt){
  if(!playing) return;
  (ph.combat||[]).forEach((c,ci)=>{
    if(t<c.t0||t>c.t1) return;
    const key=ph.id+ci;
    combatAcc.set(key,(combatAcc.get(key)||0)+dt);
    const interval = c.rate;
    if(combatAcc.get(key) < interval) return;
    combatAcc.set(key,0);
    const alive = n=>{ const g=actorMap[n]; return g&&g.visible&&!(g.userData.def.sinkAt!==undefined&&t>g.userData.def.sinkAt)&&!(g.userData.def.dieAt!==undefined&&t>g.userData.def.dieAt); };
    const as=c.a.filter(alive), bs=c.b.filter(alive);
    if(!as.length||!bs.length) return;
    const A=actorMap[as[Math.random()*as.length|0]], B=actorMap[bs[Math.random()*bs.length|0]];
    const isArmyA = A.userData.isArmy, isArmyB = B.userData.isArmy;
    const from = isArmyA? A.position.clone().add(new THREE.Vector3((Math.random()-.5)*8,2.5,(Math.random()-.5)*8))
      : _v1.copy(A.userData.gunPts[Math.random()<.5?0:1]).applyQuaternion(A.quaternion).add(A.position).clone();
    const scatter = isArmyB? 16 : 12;
    const tgt = B.position.clone().add(new THREE.Vector3((Math.random()-.5)*scatter, isArmyB?0.5:1.5, (Math.random()-.5)*scatter));
    const hit = c.land? true : Math.random()<0.42;
    fireShell(from, tgt, {hit, big: c.land?0.9: (hit?1.2:1), slow: c.land?1.15:1});
  });
}

/* ── 播放狀態 ── */
let phaseIdx=0, phaseT=0, playing=false, speed=1;
const totalDur = PHASES.reduce((s,p)=>s+p.dur,0);
const phaseStart = []; { let acc=0; PHASES.forEach(p=>{phaseStart.push(acc); acc+=p.dur;}); }

/* ── 鏡頭系統 ── */
let camMode='cine';
const orbit = { yaw:0.5, pitch:0.85, dist:180, target:new THREE.Vector3() };
function evalCam(ph, t){
  const ks = ph.cam;
  let a=ks[0], b=ks[ks.length-1];
  for(let i=0;i<ks.length-1;i++) if(t>=ks[i].t && t<=ks[i+1].t){ a=ks[i]; b=ks[i+1]; break; }
  let k = (b.t===a.t)?0:(t-a.t)/(b.t-a.t);
  k = k*k*(3-2*k);
  const pa=P3(a.pos[0],a.pos[1],a.pos[2]), pb=P3(b.pos[0],b.pos[1],b.pos[2]);
  const la=P3(a.look[0],a.look[1],a.look[2]), lb=P3(b.look[0],b.look[1],b.look[2]);
  return { pos: pa.lerp(pb,k), look: la.lerp(lb,k) };
}
const camPosS = camera.position.clone(), camLookS = new THREE.Vector3();
function updateCamera(ph, t, dt, now){
  const cine = evalCam(ph, t);
  orbit.target.lerp(cine.look, Math.min(1,dt*2));
  let targetPos, targetLook;
  if(camMode==='cine'){ targetPos=cine.pos; targetLook=cine.look; }
  else if(camMode==='bird'){
    targetPos = cine.look.clone().add(new THREE.Vector3(0.001, 330, 0.001));
    targetLook = cine.look;
  } else if(camMode==='sea'){
    const ang = now*0.07;
    targetPos = cine.look.clone().add(new THREE.Vector3(Math.cos(ang)*60, 4.5, Math.sin(ang)*60));
    targetPos.y = 4 + seaHeightAt(targetPos.x,targetPos.z,now)*0.5;
    targetLook = cine.look.clone().setY(3);
  } else { /* free */
    const cp=Math.cos(orbit.pitch), sp=Math.sin(orbit.pitch);
    targetPos = orbit.target.clone().add(new THREE.Vector3(
      Math.cos(orbit.yaw)*cp*orbit.dist, sp*orbit.dist, Math.sin(orbit.yaw)*cp*orbit.dist));
    targetLook = orbit.target;
  }
  const k = camMode==='free'? 0.35 : Math.min(1, dt*1.8);
  camPosS.lerp(targetPos, k);
  camLookS.lerp(targetLook, k);
  if(camPosS.y<2.5) camPosS.y=2.5;
  camera.position.copy(camPosS);
  camera.lookAt(camLookS);
}
/* 自由視角操作 */
let dragging=false, lastX=0, lastY=0, pinchD=0;
const cvEl = renderer.domElement;
function toFree(){ if(camMode!=='free'){ setCamMode('free'); toast('已切換至自由視角'); } }
cvEl.addEventListener('pointerdown', e=>{ dragging=true; lastX=e.clientX; lastY=e.clientY; });
addEventListener('pointerup', ()=>dragging=false);
addEventListener('pointermove', e=>{
  if(!dragging) return;
  const dx=e.clientX-lastX, dy=e.clientY-lastY; lastX=e.clientX; lastY=e.clientY;
  if(Math.abs(dx)+Math.abs(dy)<2) return;
  toFree();
  orbit.yaw += dx*0.006;
  orbit.pitch = THREE.MathUtils.clamp(orbit.pitch + dy*0.005, 0.06, 1.5);
});
cvEl.addEventListener('wheel', e=>{
  e.preventDefault(); toFree();
  orbit.dist = THREE.MathUtils.clamp(orbit.dist*(1+Math.sign(e.deltaY)*0.12), 12, 900);
},{passive:false});
cvEl.addEventListener('touchstart', e=>{ if(e.touches.length===2){ pinchD=Math.hypot(e.touches[0].clientX-e.touches[1].clientX, e.touches[0].clientY-e.touches[1].clientY); } },{passive:true});
cvEl.addEventListener('touchmove', e=>{
  if(e.touches.length===2){
    const d=Math.hypot(e.touches[0].clientX-e.touches[1].clientX, e.touches[0].clientY-e.touches[1].clientY);
    if(pinchD>0){ toFree(); orbit.dist=THREE.MathUtils.clamp(orbit.dist*(pinchD/d), 12, 900); }
    pinchD=d;
  }
},{passive:true});

function setCamMode(m){
  camMode=m;
  ['camCine','camFree','camBird','camSea'].forEach(id=>document.getElementById(id).classList.remove('active'));
  document.getElementById({cine:'camCine',free:'camFree',bird:'camBird',sea:'camSea'}[m]).classList.add('active');
  if(m==='free'){
    /* 以目前鏡頭姿態為起點 */
    const off = camera.position.clone().sub(orbit.target);
    orbit.dist = THREE.MathUtils.clamp(off.length(), 12, 900);
    orbit.yaw = Math.atan2(off.z, off.x);
    orbit.pitch = THREE.MathUtils.clamp(Math.asin(off.y/orbit.dist), 0.06, 1.5);
  }
}

function updateTimelineUI(){
  const g = phaseStart[phaseIdx] + phaseT*PHASES[phaseIdx].dur;
  const f = g/totalDur*100;
  fillEl.style.width=f+'%'; cursorEl.style.left=f+'%';
  nodesEl.querySelectorAll('.node').forEach((n,i)=>{
    n.classList.toggle('done', i<phaseIdx);

  const ph=PHASES[phaseIdx];
  phaseNameEl.textContent = `第${'一二三四五六'[phaseIdx]||phaseIdx+1}幕　${ph.title}`;
  const d = new Date(ph.d0.getTime() + (ph.d1.getTime()-ph.d0.getTime())*phaseT);
  dateTextEl.textContent = `${d.getFullYear()}.${String(d.getMonth()+1).padStart(2,'0')}.${String(d.getDate()).padStart(2,'0')}`;
}
function togglePlay(force){
  playing = force!==undefined? force : !playing;
  playBtn.textContent = playing?'❚❚':'▶';
}
playBtn.onclick=()=>togglePlay();
const speeds=[1,2,4,0.5];
speedBtn.onclick=()=>{ const i=(speeds.indexOf(speed)+1)%speeds.length; speed=speeds[i]; speedBtn.textContent=speed+'×'; };
addEventListener('keydown', e=>{
  if(e.code==='Space'){ e.preventDefault(); togglePlay(); }
  if(e.code==='ArrowRight') gotoPhase(Math.min(PHASES.length-1,phaseIdx+1),0);
  if(e.code==='ArrowLeft')  gotoPhase(Math.max(0,phaseIdx-1),0);
});

/* ── 戰役切換 ── */
function gotoPhase(i, t){
  const prev = actors;
  prev.forEach(a=>a.g.visible=false);
  phaseIdx=i; phaseT=t||0;
  const ph=PHASES[i];
  const list = buildPhase(ph);
  actors = list;
  actorMap = {};
  list.forEach(a=>{ actorMap[a.def.name]=a.g; });
  (ph.script||[]).forEach(ev=> ev._fired = phaseT>ev.t);
  setWeather(ph.weather[0], ph.weather[1]);
  buildStats(ph);
  combatAcc.clear();
  if(phaseT<0.02) showCard(ph.card);
  /* 鏡頭立即靠近該戰役 */
  const c0 = evalCam(ph, phaseT);
  if(camMode!=='free'){ camPosS.copy(c0.pos); camLookS.copy(c0.look); }
  orbit.target.copy(c0.look);
  updateTimelineUI();
}

/* ── 主迴圈 ── */
const clock = new THREE.Clock();
let statsTick=0;
function loop(){
  requestAnimationFrame(loop);
  const dt = Math.min(0.05, clock.getDelta());
  const now = clock.elapsedTime;
  const ph = PHASES[phaseIdx];
  if(playing){
    phaseT += dt*speed/ph.dur;
    if(phaseT>=1){
      if(phaseIdx<PHASES.length-1) gotoPhase(phaseIdx+1,0);
      else { phaseT=1; togglePlay(false); }
    }
  }
  animateSea(now);
  updateWeather(dt);
  updateSnow(dt, camLookS);
  updateActors(phaseT, dt, now);
  updateCombat(ph, phaseT, dt);
  updateScript(ph, phaseT);
  updateFX(dt, now);
  updateCamera(ph, phaseT, dt, now);
  updateTimelineUI();
  statsTick+=dt; if(statsTick>0.5){ statsTick=0; refreshStatsDead(phaseT); }
  renderer.render(scene,camera);
}
addEventListener('resize', ()=>{
  camera.aspect=innerWidth/innerHeight; camera.updateProjectionMatrix();
  renderer.setSize(innerWidth,innerHeight);
});

/* ── 開場：先播片頭影片，再進入節目 ── */
const VIDEO_ID='-4ZWUYna-2M';
const vidOverlay=document.getElementById('videoOverlay');
let showStarted=false, ytWatchdog=null;

function beginShow(){
  if(showStarted) return; showStarted=true;
  clearTimeout(ytWatchdog);
  vidOverlay.classList.remove('show');
  vidOverlay.innerHTML='';
  gotoPhase(0,0);
  togglePlay(true);
}

function playIntroVideo(){
  vidOverlay.classList.add('show');
  document.getElementById('skipBtn').onclick=beginShow;
  /* 直接嵌入播放器（不依賴外部 API 腳本，避免被阻擋而看不到影片） */
  const box=document.getElementById('ytBox');
  const ifr=document.createElement('iframe');
  ifr.id='ytFrame';
  ifr.allow='autoplay; encrypted-media; fullscreen; picture-in-picture';
  ifr.allowFullscreen=true;
  ifr.src='https://www.youtube.com/embed/'+VIDEO_ID
        +'?autoplay=1&mute=1&playsinline=1&rel=0&modestbranding=1&enablejsapi=1&origin='
        +encodeURIComponent(location.origin==='null'?'*':location.origin);
  const ytCmd=(func,args)=>{ try{ ifr.contentWindow.postMessage(JSON.stringify({event:'command', func, args:args||[]}), '*'); }catch(_){}};
  ifr.onload=()=>{ const l=document.getElementById('vidLoading'); if(l) l.style.display='none'; };
  box.appendChild(ifr);
  /* 與播放器握手，接收狀態訊息以偵測影片播畢（state 0 = ENDED） */
  const handshake=setInterval(()=>{
    try{ ifr.contentWindow.postMessage(JSON.stringify({event:'listening', id:'introVid'}), '*'); }catch(_){}
  }, 600);
  const soundBtn=document.getElementById('soundBtn');
  soundBtn.onclick=()=>{ ytCmd('unMute'); ytCmd('setVolume',[100]); ytCmd('playVideo'); soundBtn.style.display='none'; };
  let unmuteTried=false;
  window.addEventListener('message', function onMsg(e){
    if(!/youtube/.test(e.origin)) return;
    let d; try{ d=JSON.parse(e.data); }catch(_){ return; }
    if(d.event==='onReady' || d.event==='infoDelivery'){
      const l=document.getElementById('vidLoading'); if(l) l.style.display='none';
      if(!unmuteTried){ unmuteTried=true; ytCmd('playVideo'); ytCmd('unMute'); ytCmd('setVolume',[100]); }
      if(d.event==='infoDelivery' && d.info && typeof d.info.muted!=='undefined'){
        soundBtn.style.display = d.info.muted ? '' : 'none';   /* 仍靜音才顯示按鈕 */
      }
    }
    const st = d.event==='onStateChange' ? d.info
             : (d.event==='infoDelivery' && d.info) ? d.info.playerState : undefined;
    if(st===0){ clearInterval(handshake); window.removeEventListener('message', onMsg); beginShow(); }
  });
  /* 若 8 秒後仍未收到播放器訊息（無網路或 YouTube 被封鎖），顯示提示 */
  ytWatchdog=setTimeout(()=>{
    const l=document.getElementById('vidLoading');
    if(l && l.style.display!=='none'){
      l.innerHTML='影片似乎無法載入<br><br><a href="https://youtu.be/'+VIDEO_ID
        +'" target="_blank" style="color:#f0b429">在 YouTube 開啟 ↗</a>　或按下方「跳過片頭」進入節目';
      l.style.pointerEvents='auto';
    }
  }, 8000);
}

document.getElementById('startBtn').onclick=()=>{
  initAudio();                              /* 在使用者手勢中初始化音效 */
  document.getElementById('intro').classList.add('gone');
  playIntroVideo();
};
/* 預先載入第一幕、渲染背景 */
gotoPhase(0,0);
loop();
</script>
